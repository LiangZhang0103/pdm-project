version: '3.8'

services:
  # PostgreSQL database with pgvector extension for AI embeddings
  postgres:
    image: postgres:16-alpine
    container_name: pdm-postgres
    environment:
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm123
      POSTGRES_DB: pdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdm-network

  # MinIO for document storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: pdm-minio
    environment:
      MINIO_ROOT_USER: pdmadmin
      MINIO_ROOT_PASSWORD: pdmadmin123456
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - pdm-network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pdm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pdm123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pdm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  pdm-network:
    driver: bridge
