services:
  postgres:
    image: postgres:16-alpine
    container_name: pdm-postgres
    environment:
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm123
      POSTGRES_DB: pdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pdm-network

  minio:
    image: minio/minio:latest
    container_name: pdm-minio
    environment:
      MINIO_ROOT_USER: pdmadmin
      MINIO_ROOT_PASSWORD: pdmadmin123456
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - pdm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pdm-backend
    environment:
      DATABASE_URL: postgresql://pdm:pdm123@postgres:5432/pdm
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: pdmadmin
      MINIO_SECRET_KEY: pdmadmin123456
      MINIO_BUCKET: pdm-documents
      JWT_SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    tty: true
    stdin_open: true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - pdm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pdm-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MINIO_ENDPOINT: http://localhost:9000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    tty: true
    stdin_open: true
    depends_on:
      - backend
    networks:
      - pdm-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pdm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pdm123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pdm-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  pdm-network:
    driver: bridge
